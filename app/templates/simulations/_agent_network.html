            <button id="ned-run-btn" class="ned-run-btn" disabled>▶ Run Agent</button>
            <span class="ned-run-status" id="ned-run-status"></span>
          </div>
        </aside>
      </div>

      <!-- Diff panel -->
      <div id="anv-diff-panel" class="hidden" role="region" aria-label="Cycle diff comparison">
        <div class="anv-diff-row">
          <span class="anv-diff-label">Compare cycles:</span>
          <select id="anv-diff-a" class="anv-diff-sel" aria-label="Cycle A"></select>
          <span style="color:#475569;font-size:.8rem">vs</span>
          <select id="anv-diff-b" class="anv-diff-sel" aria-label="Cycle B"></select>
          <button id="anv-diff-compare" class="anv-hdr-btn primary">Compare →</button>
          <button id="anv-diff-close"   class="anv-hdr-btn" style="margin-left:auto">✕ Close</button>
        </div>
        <div id="anv-diff-result"></div>
      </div>

    </div><!-- /.anv-modal-body -->

    <!-- Accessibility live-announcements region -->
    <div id="anv-announce" aria-live="polite" aria-atomic="true"
         style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap"></div>

  </div><!-- /.anv-modal -->
</div><!-- /.anv-modal-overlay -->
