{% extends 'base.html' %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-sub">Enter your email address and we'll send you a reset link.</p>
    <form class="auth-form" id="resetForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div id="resetMsg" class="form-success hidden"></div>
      <div id="resetError" class="form-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('pages.login_page') }}">Back to sign in</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Sending…';
  const msgEl = document.getElementById('resetMsg');
  const errEl = document.getElementById('resetError');
  msgEl.classList.add('hidden'); errEl.classList.add('hidden');
  try {
    const res = await fetch(ROOT + '/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value }),
    });
    const data = await res.json();
    msgEl.textContent = data.message;
    msgEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Send reset link';
  } catch (err) {
    errEl.textContent = 'Request failed. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Send reset link';
  }
});
</script>
{% endblock %}
