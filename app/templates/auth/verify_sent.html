{% extends 'base.html' %}
{% block title %}Check your inbox{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card text-center">
    <div class="auth-icon">✉️</div>
    <h1 class="auth-title">Check your inbox</h1>
    <p class="auth-sub">We've sent a verification link to your email address. Click it to activate your account.</p>
    <p class="auth-hint">Didn't receive it? Check your spam folder or <a href="{{ url_for('pages.register_page') }}">re-register</a>.</p>
  </div>
</div>
{% endblock %}
